<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Archivos</title>
    <style>
        :root {
            --bg-body: #0b0b0b;
            --bg-card: #161616;
            --accent: #133c77;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header Fixed */
        .header {
            text-align: center;
            padding: 25px 15px;
            background: linear-gradient(to bottom, #111, var(--bg-body));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 { margin-top: 0; font-size: 1.8rem; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
        }

        /* Layout */
        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        .ads {
            width: 180px;
            min-width: 180px;
            padding: 20px;
            color: #444;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
        }

        .content {
            flex: 1;
            padding: 20px;
            min-width: 0; 
        }

        /* Grid Optimizado */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        /* Tarjetas */
        .card {
            background: var(--bg-card);
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border-radius: 8px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #202020;
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            background: #222;
        }

        .card-info {
            margin-top: 12px;
            text-align: center;
        }

        .card b { display: block; margin-bottom: 4px; font-size: 0.95rem; }
        .card small { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 0;
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            position: relative;
        }

        .modal-body { padding: 25px; text-align: center; }

        .modal img {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background: #1a52a1; }
        .btn-secondary { background: #333; }
        .btn-secondary:hover { background: #444; }

        @media(max-width: 900px) {
            .ads { display: none; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Biblioteca de Archivos</h1>
    <div class="controls">
        <input id="search" placeholder="Buscar por nombre...">
        <select id="filter">
            <option value="all">Todas las categorías</option>
            <option value="Juego">Juegos</option>
            <option value="Programa">Programas</option>
            <option value="Archivo">Archivos</option>
        </select>
    </div>
</div>

<div class="layout">
    <div class="ads">PUBLICIDAD</div>
    
    <div class="content">
        <p id="count" style="color:#777; font-size: 0.9rem;"></p>
        <div id="grid" class="grid"></div>
    </div>

    <div class="ads">PUBLICIDAD</div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <img id="m_img" src="" alt="Vista previa">
        <div class="modal-body">
            <h2 id="m_title" style="margin-top:0"></h2>
            <p id="m_type" style="color: #888; font-size: 0.8rem; margin-bottom: 15px;"></p>
            <p id="m_desc"></p>
            
            <div class="btn-group">
                <a id="m_download" target="_blank" style="text-decoration:none">
                    <button style="width:100%">Descargar</button>
                </a>
                <button id="copyBtn" class="btn-secondary">Copiar enlace </button>
                <button id="closeBtn" class="btn-secondary">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script>
    const items = [
        { name: "Juego 1", image: "img/asombrao.jpg", description: "Juego pro.", download: "https://google.com", type: "Juego" },
        { name: "Programa Pro", image: "img/asombrao.jpg", description: "Programa", download: "https://google.com", type: "Programa" },
        { name: "Documento Base", image: "img/asombrao.jpg", description: "Archivo", download: "https://google.com", type: "Archivo" }
    ];

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    const filter = document.getElementById("filter");
    const modal = document.getElementById("modal");
    const countText = document.getElementById("count");

    function loadItems(list) {
        grid.innerHTML = "";
        countText.textContent = `${list.length} archivos encontrados`;
        
        list.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img loading="lazy" src="${item.image}" alt="${item.name}">
                <div class="card-info">
                    <b>${item.name}</b>
                    <small>${item.type}</small>
                </div>
            `;
            card.onclick = () => openModal(item);
            grid.appendChild(card);
        });
    }

    function openModal(item) {
        document.getElementById("m_title").textContent = item.name;
        document.getElementById("m_img").src = item.image;
        document.getElementById("m_desc").textContent = item.description;
        document.getElementById("m_type").textContent = "Categoría: " + item.type;
        document.getElementById("m_download").href = item.download;
        
        modal.style.display = "flex";
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    }

    document.getElementById("closeBtn").onclick = closeModal;
    modal.onclick = (e) => { if(e.target === modal) closeModal(); };

    document.getElementById("copyBtn").onclick = function() {
        const link = document.getElementById("m_download").href;
        navigator.clipboard.writeText(link);
        const originalText = this.textContent;
        this.textContent = "¡Copiado!";
        setTimeout(() => this.textContent = originalText, 1500);
    };

    function update() {
        const text = search.value.toLowerCase();
        const type = filter.value;
        const filtered = items.filter(i => {
            const matchName = i.name.toLowerCase().includes(text);
            const matchType = (type === "all" || i.type === type);
            return matchName && matchType;
        });
        loadItems(filtered);
    }

    search.addEventListener("input", update);
    filter.addEventListener("change", update);

    loadItems(items);
</script>

</body>
