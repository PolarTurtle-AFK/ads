<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca de Archivos | Polarturtle</title>
    <style>
        :root {
            --bg-body: #0b0b0b;
            --bg-card: #161616;
            --accent: #133c77;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Header Fixed */
        .header {
            text-align: center;
            padding: 25px 15px;
            background: linear-gradient(to bottom, #111, var(--bg-body));
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .header h1 { margin: 0 0 15px 0; font-size: 1.8rem; }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        input, select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            outline: none;
        }

        /* Layout */
        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            justify-content: center;
        }

        /* Contenedores de Banner Adsterra */
        .ads {
            width: 160px;
            min-width: 160px;
            padding: 20px 10px;
            text-align: center;
        }

        .content {
            flex: 1;
            padding: 20px;
            min-width: 0; 
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .card {
            background: var(--bg-card);
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border-radius: 8px;
            border: 1px solid #222;
            display: flex;
            flex-direction: column;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #202020;
        }

        .card img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 4px;
            background: #222;
        }

        .card-info { margin-top: 12px; }
        .card b { display: block; margin-bottom: 4px; font-size: 1rem; }
        .card small { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            position: relative;
        }

        .modal-body { padding: 25px; text-align: center; }
        .modal img { width: 100%; border-radius: 8px; margin-bottom: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

        button:hover { background: #1a52a1; }
        .btn-sec { background: #333; }

        @media(max-width: 900px) {
            .ads { display: none; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Biblioteca de Archivos</h1>
    <div class="controls">
        <input id="search" placeholder="Buscar por nombre...">
        <select id="filter">
            <option value="all">Todas las categorías</option>
            <option value="Juego">Juegos</option>
            <option value="Programa">Programas</option>
            <option value="Archivo">Archivos</option>
        </select>
    </div>
</div>

<div class="layout">
    <div class="ads">
        <script type="text/javascript">
            atOptions = { 'key' : 'a71df7c4efbb73f37ab7c52a0ddbf61b', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/a71df7c4efbb73f37ab7c52a0ddbf61b/invoke.js"></script>
    </div>
    
    <div class="content">
        <p id="count" style="color:#777; font-size: 0.9rem;"></p>
        <div id="grid" class="grid"></div>
    </div>

    <div class="ads">
        <script type="text/javascript">
            atOptions = { 'key' : 'a71df7c4efbb73f37ab7c52a0ddbf61b', 'format' : 'iframe', 'height' : 600, 'width' : 160, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/a71df7c4efbb73f37ab7c52a0ddbf61b/invoke.js"></script>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-body">
            <img id="m_img" src="">
            <h2 id="m_title" style="margin:0"></h2>
            <p id="m_type" style="color: #888; font-size: 0.8rem;"></p>
            <p id="m_desc"></p>
            <div class="btn-group">
                <a id="m_download" target="_blank" style="text-decoration:none"><button style="width:100%">Descargar ahora</button></a>
                <button id="copyBtn" class="btn-sec">Copiar enlace</button>
                <button id="closeBtn" class="btn-sec">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<script>
    const items = [
        { 
            name: "Juego 1", 
            image: "img/asombrao.jpg", 
            description: "Descarga la última versión de este juego.", 
            download: "https://polarturtle-afk.github.io/juego1.zip", 
            type: "Juego" 
        },
        { 
            name: "Programa Pro", 
            image: "img/asombrao.jpg", 
            description: "Herramienta optimizada para PC.", 
            download: "https://polarturtle-afk.github.io/programa-pro.exe", 
            type: "Programa" 
        },
        { 
            name: "Archivo Base", 
            image: "img/asombrao.jpg", 
            description: "Documentación y recursos.", 
            download: "https://polarturtle-afk.github.io/archivo.pdf", 
            type: "Archivo" 
        }
    ];

    const grid = document.getElementById("grid");
    const search = document.getElementById("search");
    const filter = document.getElementById("filter");
    const modal = document.getElementById("modal");

    function loadItems(list) {
        grid.innerHTML = "";
        document.getElementById("count").textContent = `${list.length} archivos disponibles`;
        list.forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="${item.image}"> <div class="card-info"><b>${item.name}</b><small>${item.type}</small></div>`;
            card.onclick = () => {
                document.getElementById("m_title").textContent = item.name;
                document.getElementById("m_img").src = item.image;
                document.getElementById("m_desc").textContent = item.description;
                document.getElementById("m_type").textContent = item.type;
                document.getElementById("m_download").href = item.download;
                modal.style.display = "flex";
                document.body.style.overflow = "hidden";
            };
            grid.appendChild(card);
        });
    }

    document.getElementById("closeBtn").onclick = () => {
        modal.style.display = "none";
        document.body.style.overflow = "auto";
    };

    document.getElementById("copyBtn").onclick = function() {
        navigator.clipboard.writeText(document.getElementById("m_download").href);
        this.textContent = "¡Copiado!";
        setTimeout(() => this.textContent = "Copiar enlace", 1500);
    };

    function update() {
        const t = search.value.toLowerCase();
        const f = filter.value;
        const filtered = items.filter(i => i.name.toLowerCase().includes(t) && (f === "all" || i.type === f));
        loadItems(filtered);
    }

    search.oninput = update;
    filter.onchange = update;
    loadItems(items);
</script>

</body>
</html>
