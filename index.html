<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biblioteca de Archivos</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* header */

.header{
text-align:center;
padding:20px;
}

/* layout */

.layout{
display:flex;
}

/* anuncios */

.ads{
width:180px;
text-align:center;
padding-top:20px;
color:#777;
}

/* contenido */

.content{
flex:1;
padding:20px;
text-align:center;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:20px;
}

/* card */

.card{
background:#111;
padding:10px;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

/* modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000dd;
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:25px;
max-width:400px;
width:90%;
text-align:center;
}

.modal img{
width:100%;
}

/* mobile */

@media(max-width:900px){

.ads{
display:none;
}

}

</style>

</head>

<body>

<div class="header">

<h1>Biblioteca de Archivos</h1>

<input
id="search"
placeholder="Buscar..."
style="padding:10px;width:220px"
>

<select id="filter" style="padding:10px">
<option value="all">Todos</option>
<option value="Juego">Juegos</option>
<option value="Programa">Programas</option>
<option value="Archivo">Archivos</option>
</select>

</div>


<div class="layout">

<div class="ads">
ANUNCIO
</div>


<div class="content">

<p id="count"></p>

<div id="grid" class="grid"></div>

</div>


<div class="ads">
ANUNCIO
</div>

</div>


<!-- modal -->

<div id="modal" class="modal">

<div class="modal-content">

<h2 id="m_title"></h2>

<img id="m_img">

<p id="m_desc"></p>

<p id="m_type"></p>

<a id="m_download" target="_blank">
<button style="padding:10px 20px;background:#0b2a55;color:white;border:none;">
Descargar
</button>
</a>

<br><br>

<button id="copyBtn">Copiar link</button>

<br><br>

<button id="closeBtn">Cerrar</button>

</div>

</div>


<script>

/* ARCHIVOS */

const items=[

{
name:"Juego 1",
image:"img/asombrao.jpg",
description:"Juego divertido",
download:"https://google.com",
type:"Juego"
},

{
name:"Editor Texto",
image:"img/editor.jpg",
description:"Editor simple",
download:"https://google.com",
type:"Programa"
},

{
name:"Pack Texturas",
image:"img/texturas.jpg",
description:"Texturas HD",
download:"https://google.com",
type:"Archivo"
}

];


/* elementos */

const grid=document.getElementById("grid");
const search=document.getElementById("search");
const filter=document.getElementById("filter");

const modal=document.getElementById("modal");

const m_title=document.getElementById("m_title");
const m_img=document.getElementById("m_img");
const m_desc=document.getElementById("m_desc");
const m_type=document.getElementById("m_type");
const m_download=document.getElementById("m_download");


/* contador */

document.getElementById("count").textContent=
items.length+" archivos disponibles";


/* cargar */

function loadItems(list){

grid.innerHTML="";

list.forEach(item=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img loading="lazy" src="${item.image}">

<br><br>

<b>${item.name}</b>

<br>

<small>${item.type}</small>

`;

card.onclick=()=>openModal(item);

grid.appendChild(card);

});

}


/* modal */

function openModal(item){

modal.style.display="flex";

m_title.textContent=item.name;
m_img.src=item.image;
m_desc.textContent=item.description;
m_type.textContent="Tipo: "+item.type;

m_download.href=item.download;

}


function closeModal(){
modal.style.display="none";
}


document.getElementById("closeBtn").onclick=closeModal;


/* cerrar click fuera */

modal.onclick=(e)=>{
if(e.target===modal){
closeModal();
}
};


/* copiar link */

document.getElementById("copyBtn").onclick=()=>{

navigator.clipboard.writeText(m_download.href);

alert("Link copiado");

};


/* buscador + filtro */

function update(){

let text=search.value.toLowerCase();
let type=filter.value;

let filtered=items.filter(i=>{

let matchName=i.name.toLowerCase().includes(text);
let matchType=(type==="all" || i.type===type);

return matchName && matchType;

});

loadItems(filtered);

}


search.addEventListener("input",update);
filter.addEventListener("change",update);


loadItems(items);

</script>

</body>
</html>
